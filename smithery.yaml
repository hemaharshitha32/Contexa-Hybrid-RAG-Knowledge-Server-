startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties:
      singleInstance:
        type: string
        description: "Set to '1' to enable single-instance guard (prevents duplicate server processes)"
        default: ""
      watcherDisabled:
        type: string
        description: "Set to '1' to disable file watcher and auto-reindex"
        default: ""
    additionalProperties: false
  commandFunction: |-
    (config) => ({
      command: 'uvx',
      args: ['knowledge-rag'],
      env: {
        ...(config.singleInstance ? { KNOWLEDGE_RAG_SINGLE_INSTANCE: config.singleInstance } : {}),
        ...(config.watcherDisabled ? { KNOWLEDGE_RAG_WATCHER_DISABLED: config.watcherDisabled } : {}),
      }
    })
